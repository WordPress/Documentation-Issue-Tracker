name: Sync labels from Project status

on:
  project_card: 
    types: [edited]

permissions:
  contents: read
  issues: write
  pull-requests: write
  # project: read

jobs:
  sync-labels:
    # Run only when the "Status" field is edited.
    if: ${{ github.event.changes.field_value }}
    runs-on: ubuntu-latest
    steps:
      - name: Update issue labels from project status
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core'); // Import core for logging
            const item = context.payload.projects_v2_item;
            const projectNodeId = item?.project_node_id;
            const contentNodeId = item?.content_node_id;

            if (!contentNodeId || !projectNodeId) {
              core.info('Missing content_node_id or project_node_id; nothing to do.');
              return;
            }

            // Fetch item content + Status field value
            const query = `
              query($projectId: ID!, $itemId: ID!) {
                node(id: $itemId) {
                  ... on ProjectV2Item {
                    content {
                      __typename
                      ... on Issue {
                        id
                        number
                        repository {
                          name
                          owner { login }
                        }
                        labels(first: 100) {
                          nodes { name }
                        }
                      }
                    }
                    fieldValues(first: 50) {
                      nodes {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                          field {
                            ... on ProjectV2SingleSelectField {
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
                project: node(id: $projectId) {
                  ... on ProjectV2 {
                    title
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              projectId: projectNodeId,
              itemId: item.id
            });

            const projectItem = result?.node;
            const issue = projectItem?.content;

            if (!issue || issue.__typename !== 'Issue') {
              core.info('Project item is not an Issue; skipping.');
              return;
            }

            const statusValue = (projectItem.fieldValues.nodes || []).find(
              (v) => v?.field?.name === 'Status'
            )?.name;

            if (!statusValue) {
              core.info('No Status value found; skipping.');
              return;
            }

            // Custom mapping from user:
            // - In Progress -> add [Status] In progress
            // - Needs 1st Review -> add [Status] Review, remove [Status] In progress
            // - Done -> remove [Status] Review
            const mapping = {
              'In Progress': {
                add: ['[Status] In progress'],
                remove: []
              },
              'Needs 1st Review': {
                add: ['[Status] Review'],
                remove: ['[Status] In progress']
              },
              'Done': {
                add: [],
                remove: ['[Status] Review']
              }
            };

            const rule = mapping[statusValue];
            if (!rule) {
              core.info(`No mapping for Status="${statusValue}"; skipping.`);
              return;
            }

            const owner = issue.repository.owner.login;
            const repo = issue.repository.name;
            const issue_number = issue.number;
            const existing = new Set((issue.labels.nodes || []).map((l) => l.name));

            // Add labels
            const labelsToAdd = rule.add.filter((name) => !existing.has(name));
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: labelsToAdd
              });
              core.info(`Added labels: ${labelsToAdd.join(', ')}`);
            }

            // Remove labels (ignore if already absent)
            for (const name of rule.remove) {
              if (!existing.has(name)) {
                continue;
              }
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name
                });
                core.info(`Removed label: ${name}`);
              } catch (error) {
                // 404 if label no longer present; safe to ignore
                if (error.status !== 404) {
                  throw error;
                }
              }
            }
