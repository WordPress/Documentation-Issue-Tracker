name: Sync labels from Project status
on:
  project_v2_item:
    types: [edited, converted]
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  projects: read

jobs:
  sync-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Sync issue labels from project status
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const core = require('@actions/core');

            const owner = 'WordPress';
            const projectNumber = 286; // WordPress 7.0 Documentation

            const mapping = {
              'In Progress': {
                add: ['[Status] In progress'],
                remove: ['[Status] Review'],
              },
              'Needs 1st Review': {
                add: ['[Status] Review'],
                remove: ['[Status] In progress'],
              },
              'Done': {
                add: [],
                remove: ['[Status] In progress', '[Status] Review'],
              },
            };

            const query = `
              query($owner: String!, $number: Int!, $cursor: String) {
                organization(login: $owner) {
                  projectV2(number: $number) {
                    items(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        content {
                          __typename
                          ... on Issue {
                            number
                            repository {
                              name
                              owner { login }
                            }
                            labels(first: 100) {
                              nodes { name }
                            }
                          }
                          ... on PullRequest {
                            number
                            repository {
                              name
                              owner { login }
                            }
                            labels(first: 100) {
                              nodes { name }
                            }
                          }
                        }
                        fieldValues(first: 50) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let cursor = null;
            let processed = 0;

            do {
              const result = await github.graphql(query, {
                owner,
                number: projectNumber,
                cursor,
              });
              const items = result.organization.projectV2.items;

              for (const item of items.nodes) {
                const content = item.content;

                if (!content || !['Issue', 'PullRequest'].includes(content.__typename)) {
                  continue;
                }

                const status = item.fieldValues.nodes.find(
                  (value) => value?.field?.name === 'Status'
                )?.name;

                if (!status) {
                  continue;
                }

                if (!mapping[status]) {
                  core.warning(`Unknown Status option: ${status}`);
                  continue;
                }

                const rule = mapping[status];

                const repoOwner = content.repository.owner.login;
                const repo = content.repository.name;
                const number = content.number;
                const existing = new Set(content.labels.nodes.map((label) => label.name));

                const labelsToAdd = rule.add.filter((label) => !existing.has(label));

                if (labelsToAdd.length > 0) {
                  await github.rest.issues.addLabels({
                    owner: repoOwner,
                    repo,
                    issue_number: number,
                    labels: labelsToAdd,
                  });

                  core.info(`#${number}: added ${labelsToAdd.join(', ')}`);
                }

                for (const label of rule.remove) {
                  if (!existing.has(label)) {
                    continue;
                  }

                  try {
                    await github.rest.issues.removeLabel({
                      owner: repoOwner,
                      repo,
                      issue_number: number,
                      name: label,
                    });

                    core.info(`#${number}: removed ${label}`);
                  } catch (error) {
                    if (error.status !== 404) {
                      throw error;
                    }
                  }
                }

                processed++;
              }

              cursor = items.pageInfo.hasNextPage ? items.pageInfo.endCursor : null;
            } while (cursor);

            core.info(`Processed ${processed} project items.`);
